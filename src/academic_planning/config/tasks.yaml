classify_student_request:
  agent: academic_coordinator
  expected_output: "request_type, workflow, required_agents"

analyze_academic_activity:
  agent: task_analyzer
  expected_output: "activity_type, deadline, estimated_hours, complexity, priority, missing_information"

decompose_activity:
  agent: task_analyzer
